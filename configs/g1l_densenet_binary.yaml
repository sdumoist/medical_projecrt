# Project configuration for G1-L DenseNet binary classification with localizer

# Data config
data:
  data_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/data/Shoulder/RightData"
  json_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/shouder/final_output/to_extract/case_json"
  nnunet_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/nnUNet/output"

  # Cache settings (localizer needs cache_loc)
  use_cache: true
  cache_mode: loc
  cache_root: outputs/cache_loc

  sequences:
    - axial_PD
    - coronal_PD
    - coronal_T2WI
    - sagittal_PD
    - sagittal_T1WI

  diseases:
    - SST
    - IST
    - SSC
    - LHBT
    - IGHL
    - RIPI
    - GHOA

# Model config
model:
  name: "densenet_copas_binary_localizer"
  encoder: "densenet3d_121"
  pretrained: true

  input_spacing: [1.0, 1.0, 1.0]
  crop_size: [96, 96, 64]

  # Localizer settings
  use_localizer: true
  localizer_mode: "key_slice"  # key_slice or roi

# Training config
training:
  num_classes: 2

  batch_size: 2
  num_workers: 0
  max_epochs: 50
  learning_rate: 0.0001

  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5

  loss: "bce"

  patience: 10

  # Localizer loss weight
  localizer_alpha: 0.2

# Validation config
validation:
  val_interval: 1
  save_best: true

# Output config
output:
  exp_name: "g1l_densenet_binary"
  output_dir: "outputs/experiments"
  save_tokens: true
  tokens_dir: "outputs/tokens"