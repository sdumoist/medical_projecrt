# Smoke test config: single GPU, label_binary only, 2 epochs
stage: 1

mri_cv:
  encoder: "swin3d_tiny"
  checkpoint_path: "outputs/experiments/g3_swin_binary/best_model.pt"
  use_localizer: false
  freeze: true

projector:
  num_visual_tokens: 3

llm:
  model_name: "Qwen/Qwen2.5-7B"
  model_path: "/mnt/cfs_algo_bj/models/opensource_model/Qwen/Qwen2.5-7B"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  torch_dtype: "bfloat16"
  use_flash_attn: true
  gradient_checkpointing: true

data:
  cache_root: "outputs/cache_cls"
  cache_mode: "cls"
  cache_index: "outputs/cache_cls/cache_cls_index.csv"
  max_seq_length: 1024

  train_jsonl:
    - "outputs/sft_data/split/sft_label_binary_train.jsonl"

  val_jsonl:
    - "outputs/sft_data/split/sft_label_binary_val.jsonl"

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  num_workers: 0
  max_epochs: 2
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  seed: 42

validation:
  val_interval: 1
  generation_max_length: 256

output:
  exp_name: "sft_stage1_smoke"
  output_dir: "outputs/sft_experiments"
