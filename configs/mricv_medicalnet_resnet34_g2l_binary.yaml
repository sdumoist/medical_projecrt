# MedicalNet ResNet34-G2L: classification + key-slice localizer
# Uses cache_loc for slice-level supervision
# Phase 1 of MedicalNet-CoPAS-Grounded upgrade

data:
  data_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/data/Shoulder/RightData"
  json_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/shouder/final_output/to_extract/case_json"
  nnunet_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/nnUNet/output"
  use_cache: true
  cache_mode: loc
  cache_root: outputs_clean/cache_loc
  sequences:
    - axial_PD
    - coronal_PD
    - coronal_T2WI
    - sagittal_PD
    - sagittal_T1WI
  diseases: [SST, IST, SSC, LHBT, IGHL, RIPI, GHOA]

model:
  name: "mricv_medicalnet_resnet34_g2l_binary"
  encoder: "resnet34"
  pretrained: true
  pretrained_path: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/shoulder_pretrain_repos/MedicalNet/pretrain/resnet_34_23dataset.pth"
  use_localizer: true
  localizer_mode: "key_slice"

training:
  num_classes: 2
  batch_size: 8
  num_workers: 4
  max_epochs: 50
  learning_rate: 0.0001
  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 3
  loss: "bce"
  branch_alpha: 0.3
  localizer_alpha: 0.2
  patience: 10
  use_amp: true

validation:
  val_interval: 1
  save_best: true

output:
  exp_name: "mricv_medicalnet_resnet34_g2l_binary"
  output_dir: "outputs_clean/experiments"
  save_tokens: false
  tokens_dir: "outputs/tokens"
