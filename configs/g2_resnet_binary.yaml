# Project configuration for G2 ResNet binary classification

# Data config
data:
  data_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/data/Shoulder/RightData"
  json_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/shouder/final_output/to_extract/case_json"
  nnunet_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/nnUNet/output"

  # Cache settings
  use_cache: true
  cache_mode: cls
  cache_root: outputs/cache_cls

  sequences:
    - axial_PD
    - coronal_PD
    - coronal_T2WI
    - sagittal_PD
    - sagittal_T1WI

  diseases:
    - SST
    - IST
    - SSC
    - LHBT
    - IGHL
    - RIPI
    - GHOA

# Model config
model:
  name: "resnet_copas_binary"
  encoder: "resnet101"
  pretrained: true

  input_spacing: [1.0, 1.0, 1.0]
  crop_size: [96, 96, 64]  # Only used for raw nii fallback
  use_localizer: false
  localizer_mode: "key_slice"

# Training config
training:
  num_classes: 2

  batch_size: 2
  num_workers: 0
  max_epochs: 50
  learning_rate: 0.0001

  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5

  loss: "bce"

  patience: 10

# Validation config
validation:
  val_interval: 1
  save_best: true

# Output config
output:
  exp_name: "g2_resnet_binary"
  output_dir: "outputs/experiments"
  save_tokens: true
  tokens_dir: "outputs/tokens"