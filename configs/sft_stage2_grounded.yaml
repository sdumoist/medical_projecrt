# Grounded SFT Stage 2: Partially unfrozen MRI-CV + key-slice joint loss
# 10 visual tokens: 3 global + 7 local
# Unfreeze Swin last stage, L = L_LM + 0.3 * L_keyslice

stage: 2

# ── MRI-CV backbone ──
mri_cv:
  encoder: "swin3d_tiny"
  checkpoint_path: "outputs/experiments/g3_grounded_swin_binary/best_model.pt"
  use_localizer: true
  freeze: false
  unfreeze_layers: "last_stage"
  lr_multiplier: 0.1

# ── Visual Projector ──
projector:
  num_visual_tokens: 10

# ── LLM ──
llm:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  model_path: "/mnt/cfs_algo_bj/models/opensource_model/Qwen/Qwen2.5-7B-Instruct"
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lora_dropout: 0.05
  torch_dtype: "bfloat16"
  use_flash_attn: true
  gradient_checkpointing: true

# ── Data ──
data:
  cache_root: "outputs/cache_loc"
  cache_mode: "loc"
  cache_index: "outputs/cache_loc/cache_loc_index.csv"
  max_seq_length: 2048

  train_jsonl:
    - "outputs/sft_data/sft_label_binary_train.jsonl"
    - "outputs/sft_data/sft_diagnosis_chain_train.jsonl"
  val_jsonl:
    - "outputs/sft_data/sft_label_binary_val.jsonl"
    - "outputs/sft_data/sft_diagnosis_chain_val.jsonl"

# ── Training ──
training:
  batch_size: 2
  gradient_accumulation_steps: 4
  num_workers: 4
  max_epochs: 3
  learning_rate: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  seed: 42
  # Stage 2: joint LM + key-slice loss
  keyslice_alpha: 0.3

# ── Resume ──
# Resume from Stage 1 best checkpoint
# Pass --resume outputs/sft_experiments/sft_stage1_grounded/best_checkpoint.pt

# ── Validation ──
validation:
  val_interval: 1
  generation_max_length: 512

# ── Output ──
output:
  exp_name: "sft_stage2_grounded"
  output_dir: "outputs/sft_experiments"
