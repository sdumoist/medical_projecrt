# Project configuration for G1 DenseNet ternary classification

# Data config
data:
  data_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/data/Shoulder/RightData"
  json_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/shouder/final_output/to_extract/case_json"
  nnunet_root: "/mnt/cfs_algo_bj/models/experiments/lirunze/code/nnUNet/output"

  sequences:
    - axial_PD
    - coronal_PD
    - coronal_T2WI
    - sagittal_PD
    - sagittal_T1WI

  diseases:
    - SST
    - IST
    - SSC
    - LHBT
    - IGHL
    - RIPI
    - GHOA

# Model config
model:
  name: "densenet_copas_ternary"
  encoder: "densenet121"
  pretrained: true
  input_spacing: [1.0, 1.0, 1.0]
  crop_size: [96, 96, 64]
  use_localizer: false
  localizer_mode: "key_slice"

# Training config
training:
  # Ternary classification (negative, uncertain, positive)
  num_classes: 3

  batch_size: 2
  num_workers: 0
  max_epochs: 50
  learning_rate: 0.0001

  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5

  loss: "cross_entropy"
  label_smoothing: 0.1

  patience: 10

# Validation config
validation:
  val_interval: 1
  save_best: true

# Output config
output:
  exp_name: "g1_densenet_ternary"
  output_dir: "outputs/experiments"
  save_tokens: true
  tokens_dir: "outputs/tokens"