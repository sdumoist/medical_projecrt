# Stage 3: Full fine-tuning (placeholder)
# NOT IMPLEMENTED - config only, no code support yet.
#
# When implemented:
#   - Unfreeze all MRI-CV layers
#   - Merge LoRA into base model or continue with LoRA
#   - Very low LR (1e-5), short training (1-2 epochs)
#   - Requires careful gradient scaling between vision and language
stage: 3

mri_cv:
  encoder: "swin3d_tiny"
  checkpoint_path: "outputs/experiments/g3_swin_binary/best_model.pt"
  use_localizer: false
  freeze: false
  unfreeze_layers: "all"

projector:
  num_visual_tokens: 3

llm:
  model_name: "Qwen/Qwen2.5-7B"
  model_path: "Qwen/Qwen2.5-7B"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  torch_dtype: "bfloat16"
  use_flash_attn: true
  gradient_checkpointing: true

data:
  cache_root: "outputs/cache_cls"
  cache_mode: "cls"
  cache_index: "outputs/cache_cls/cache_cls_index.csv"
  max_seq_length: 2048
  train_jsonl:
    - "outputs/sft_data/split/sft_label_binary_train.jsonl"
    - "outputs/sft_data/split/sft_diagnosis_chain_train.jsonl"
  val_jsonl:
    - "outputs/sft_data/split/sft_label_binary_val.jsonl"

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 4
  max_epochs: 2
  learning_rate: 0.00001          # 1e-5 (very low)
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  seed: 42

validation:
  val_interval: 1
  generation_max_length: 512

output:
  exp_name: "sft_stage3_full_ft"
  output_dir: "outputs/sft_experiments"
